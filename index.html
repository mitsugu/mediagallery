<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery (Image & Video)</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --accent-color: #007bff;
        }

        body { font-family: sans-serif; background: var(--bg-color); padding: 20px; }
		h1 { font-size:2.5rem; text-align:center; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 画像と動画のサムネイル共通スタイル */
        .thumb-wrapper {
            width: 100%;
            height: 180px;
            cursor: pointer;
            background: #000;
            position: relative;
        }

        .thumb-wrapper img, .thumb-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 動画の場合に「再生マーク」を重ねる（任意） */
        .video-indicator::after {
            content: "▶";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.8);
            font-size: 30px;
            pointer-events: none;
        }

        .item-info { padding: 10px; display: flex; justify-content: center; }
        .copy-btn {
            background: var(--accent-color); color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
        }

        /* --- ライトボックス --- */
        .lightbox {
            display: none; position: fixed; z-index: 1000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); flex-direction: column;
            justify-content: center; align-items: center;
        }
        .lightbox.active { display: flex; }
		.lightbox-content {
		    width: 90vw;      /* 画面の横幅の90%を基準にする */
		    height: 80vh;     /* 画面の高さの80%を基準にする */
		    object-fit: contain; /* アスペクト比を維持しつつ、枠内に最大サイズで収める */
		    outline: none;
		}
		video.lightbox-content {
		    background-color: #000;
		}
        .close-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 20px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
    </style>
</head>

        const container = document.getElementById('media-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxBody = document.getElementById('lightbox-body');
        const modalCopyBtn = document.getElementById('modal-copy-btn');

        // ファイルが動画かどうか判定するヘルパー
        const isVideo = (url) => url.toLowerCase().endsWith('.mp4');

        mediaUrls.forEach(url => {
            const item = document.createElement('div');
            item.classList.add('gallery-item');

            const thumbWrapper = document.createElement('div');
            thumbWrapper.classList.add('thumb-wrapper');
            thumbWrapper.onclick = () => openLightbox(url);

            if (isVideo(url)) {
                // 動画サムネイルの設定
                const video = document.createElement('video');
                // #t=0.1 を付けると最初の0.1秒地点を表示してくれる
                video.src = url + "#t=0.1";
                video.preload = "metadata";
                video.muted = true;
                thumbWrapper.appendChild(video);
                thumbWrapper.classList.add('video-indicator');
            } else {
                // 画像サムネイルの設定
                const img = document.createElement('img');
                img.src = url;
                thumbWrapper.appendChild(img);
            }

            const info = document.createElement('div');
            info.classList.add('item-info');
            const btn = document.createElement('button');
            btn.classList.add('copy-btn');
            btn.textContent = "URLをコピー";
            btn.onclick = (e) => { e.stopPropagation(); copyToClipboard(url); };

            info.appendChild(btn);
            item.appendChild(thumbWrapper);
            item.appendChild(info);
            container.appendChild(item);
        });

        function openLightbox(url) {
            lightboxBody.innerHTML = ''; // 中身をリセット

            if (isVideo(url)) {
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.autoplay = true;
                video.classList.add('lightbox-content');
                lightboxBody.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = url;
                img.classList.add('lightbox-content');
                lightboxBody.appendChild(img);
            }

            lightbox.classList.add('active');
            modalCopyBtn.onclick = () => copyToClipboard(url);
        }

        function closeLightbox() {
            // 動画が流れたままにならないよう中身を空にする
            lightboxBody.innerHTML = '';
            lightbox.classList.remove('active');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 2000);
            });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeLightbox();
        });
    </script>
